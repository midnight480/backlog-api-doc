[mypy]
# Basic configuration
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
show_error_codes = True
show_column_numbers = True
pretty = True

# Gradual adoption settings - start lenient, tighten over time
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_decorators = False
check_untyped_defs = True
strict_optional = True

# Import handling
ignore_missing_imports = True
follow_imports = silent
namespace_packages = True

# Error reporting
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# FastAPI specific overrides
[mypy-src.mcp_server]
# FastAPI route handlers often have complex signatures
disallow_untyped_defs = False

[mypy-src.config]
# Configuration modules may have dynamic imports
ignore_missing_imports = True

[mypy-src.fetch_docs]
# Document fetching may have external dependencies
ignore_missing_imports = True

# External library overrides
[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-beautifulsoup4.*]
ignore_missing_imports = True

[mypy-markdownify.*]
ignore_missing_imports = True

# Test files - more lenient
[mypy-tests.*]
disallow_untyped_defs = False
ignore_errors = False
check_untyped_defs = False